name: Docker Build & Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push version bump commit + tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to find last tag

      # Reads conventional commit messages since the last tag and creates a new tag.
      # feat:       → minor bump  (0.2.0 → 0.3.0)
      # fix: / rest → patch bump  (0.2.0 → 0.2.1)
      # feat!: / BREAKING CHANGE → major bump (0.2.0 → 1.0.0)
      - name: Auto-tag via conventional commits
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Sync Cargo.toml version
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          # Only commit if Cargo.toml actually changed
          git diff --staged --quiet || git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            dasaod/sf-guildscanner:latest
            dasaod/sf-guildscanner:${{ steps.tag.outputs.new_version }}
          build-args: |
            VERSION=${{ steps.tag.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub README
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: dasaod/sf-guildscanner
          readme-filepath: ./README.md
