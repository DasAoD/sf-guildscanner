version: "3.8"

# Use this file to build the image from source instead of pulling from Docker Hub:
#   docker compose -f docker-compose.build.yml up -d --build

services:
  sfguild-scanner:
    build: .
    container_name: sfguild-scanner
    ports:
      - "8085:8080"
    volumes:
      - ./data:/app/data
    environment:
      - RUST_LOG=info
    restart: unless-stopped
